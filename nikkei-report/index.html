<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日経早報アーカイブ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Noto+Serif+JP:wght@400;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F2EBE4;
  --bg-card: #FDFCFA;
  --border: #D8D2CB;
  --text: #1a1a1a;
  --text-dim: #6b7084;
  --text-heading: #3A4A7A;
  --accent1: #4A5A8A;
  --accent2: #6B7DB3;
  --accent3: #8B7DAA;
  --radius: 8px;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  -webkit-font-smoothing: antialiased;
}

.container { max-width:640px; margin:0 auto; padding:0 20px; }

.top-bar {
  background: linear-gradient(135deg, #4A5A8A, #6B7DB3, #8B7DAA);
  padding:12px 0;
  box-shadow: 0 2px 8px rgba(74,90,138,0.15);
}
.top-bar .container { display:flex; align-items:center; justify-content:space-between; }
.top-bar .logo {
  font-size:16px; font-weight:700; color:#fff; letter-spacing:0.03em;
}
.top-bar .tag {
  font-family:'IBM Plex Mono',monospace; font-size:11px; color:rgba(255,255,255,0.75);
  letter-spacing:0.06em;
}

.hero {
  text-align:center; padding:56px 0 40px;
  border-bottom:2px solid transparent;
  border-image: linear-gradient(90deg, #4A5A8A, #6B7DB3, #8B7DAA) 1;
}
.hero h1 {
  font-family:'Noto Serif JP',serif; font-size:26px; font-weight:700;
  color:var(--text-heading); margin-bottom:8px;
}
.hero .sub {
  font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--text-dim);
  letter-spacing:0.06em;
}

.list { padding:36px 0 64px; }

.entry {
  display:flex; align-items:center; gap:16px;
  background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius);
  padding:20px 24px; margin-bottom:12px;
  text-decoration:none; color:inherit;
  transition: border-color 0.2s, transform 0.15s;
}
.entry:hover { border-color:var(--accent2); transform:translateX(4px); }

.entry-date {
  font-family:'IBM Plex Mono',monospace; font-size:13px; font-weight:500;
  color:var(--accent2); white-space:nowrap; min-width:100px;
}
.entry-dow {
  font-family:'IBM Plex Mono',monospace; font-size:11px;
  color:var(--text-dim); margin-left:4px;
}
.entry-title {
  font-size:15px; font-weight:700; color:var(--text-heading); line-height:1.4;
}
.entry-meta {
  font-size:12px; color:var(--text-dim); margin-top:2px;
}
.entry-arrow {
  margin-left:auto; color:var(--accent2); font-size:18px; flex-shrink:0;
}

.badge-latest {
  font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:0.08em;
  color:#fff; background:var(--accent2); border-radius:3px;
  padding:2px 7px; margin-left:8px; vertical-align:middle;
}

footer {
  text-align:center; padding:24px 0 48px;
  border-top:2px solid transparent;
  border-image:linear-gradient(90deg, #4A5A8A, #6B7DB3, #8B7DAA) 1;
}
footer p { font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--text-dim); }

@media (max-width:640px) {
  .entry { padding:16px 16px; gap:12px; }
  .entry-date { min-width:80px; font-size:12px; }
  .entry-title { font-size:14px; }
}
</style>
</head>
<body>

<nav class="top-bar">
  <div class="container">
    <span class="logo">日経早報</span>
    <span class="tag">ARCHIVE</span>
  </div>
</nav>

<div class="container">
<header class="hero">
  <h1>日経早報アーカイブ</h1>
  <div class="sub">編集長 CC &middot; 副編集長 MAKKU</div>
</header>

<div class="list">

  <a class="entry" href="2026-04-16.html">
    <div>
      <span class="entry-date">2026-04-16</span><span class="entry-dow">THU</span>
      <span class="badge-latest">LATEST</span>
    </div>
    <div>
      <div class="entry-title">日経早報 2026-04-16（木）</div>
      <div class="entry-meta">7栏目 21篇 + 国際ニュース 12条</div>
    </div>
    <span class="entry-arrow">&rsaquo;</span>
  </a>

  <a class="entry" href="2026-04-15.html">
    <div>
      <span class="entry-date">2026-04-15</span><span class="entry-dow">WED</span>
    </div>
    <div>
      <div class="entry-title">日経早報 2026-04-15（水）</div>
      <div class="entry-meta">7栏目 21篇 + 国際ニュース 12条</div>
    </div>
    <span class="entry-arrow">&rsaquo;</span>
  </a>

</div>
</div>

<footer>
  <p>nikkei_morning_report.py &middot; kinyu-makkunami.github.io</p>
</footer>

</body>
</html>
